<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Don't Drop the Dough</title>
    <style>
        * {
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            background: radial-gradient(circle, #2e3b23 0%, #000000 80%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: #000;
            max-width: 100vw;
            max-height: 100vh;
            width: auto;
            height: auto;
            aspect-ratio: 400 / 600;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border: 2px solid #4a3728;
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- ASSETS ---
        const imgToast = new Image(); imgToast.src = 'toast.png';
        const imgToaster = new Image(); imgToaster.src = 'toaster.png';
        const imgButter = new Image(); imgButter.src = 'butter.png';
        const imgBg = new Image(); imgBg.src = 'background.png';

        const bgMusic = new Audio('toastmusic.mp3');
        bgMusic.loop = true;
        let audioStarted = false;

        const TABLE_HEIGHT = 520; 
        let gameState = 'START';
        let toastY = 460;
        let velocity = 0;
        let gravity = 0.25; 
        let rotation = 0;
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let butters = [];
        let butterSpeed = 4;
        let frameCount = 0;

        document.addEventListener('gesturestart', (e) => e.preventDefault());

        function handleInput(e) {
            if (e && e.cancelable) e.preventDefault(); 
            if (!audioStarted) {
                bgMusic.play().catch(e => console.log("Audio error"));
                audioStarted = true;
            }

            if (gameState === 'START') {
                gameState = 'PLAYING';
                velocity = -11; 
            } else if (gameState === 'PLAYING') {
                velocity = -5.5; 
            } else if (gameState === 'GAMEOVER') {
                resetGame();
            }
        }

        function resetGame() {
            toastY = 460; velocity = 0; score = 0; butterSpeed = 4;
            butters = []; gameState = 'START'; frameCount = 0;
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(e); });
        canvas.addEventListener('mousedown', (e) => handleInput(e));
        canvas.addEventListener('touchstart', (e) => handleInput(e), {passive: false});

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);

            if (gameState === 'START') {
                ctx.drawImage(imgToaster, 130, 430, 140, 100);
                ctx.drawImage(imgToast, 175, 420, 50, 50);
                
                ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
                ctx.fillRect(40, 100, 320, 220);
                ctx.fillStyle = "#4a3728";
                ctx.font = "20px Arial Black";
                ctx.fillText("DON'T DROP THE DOUGH!", 50, 150);
                ctx.font = "14px Arial Black";
                ctx.fillText("Stay between the ceiling and table!", 60, 190);
                ctx.fillText("Butter targets lazy bread!", 100, 215);
                ctx.font = "20px Arial Black";
                ctx.fillText("TAP TO START", 115, 270);
            } 
            
            else if (gameState === 'PLAYING') {
                frameCount++;
                if (frameCount % 450 === 0) butterSpeed += 0.6;

                velocity += gravity;
                toastY += velocity;
                rotation += velocity * 0.1;

                let multiplier = (toastY > 450) ? 10 : 1;
                score += (1 * multiplier);

                // --- ANTI-CHEESE BUTTER LOGIC ---
                if (frameCount % 65 === 0) {
                    let spawnY;
                    // 35% chance to target the toast's current row
                    if (Math.random() < 0.35) {
                        spawnY = toastY - 10; // "Sniper" butter
                    } else {
                        spawnY = 30 + Math.random() * 420; // Random butter
                    }
                    butters.push({ x: canvas.width, y: spawnY, w: 60, h: 50 });
                }

                const tHB = { x: 175 + 15, y: toastY + 15, w: 20, h: 20 };

                butters.forEach((b, i) => {
                    b.x -= butterSpeed;
                    ctx.drawImage(imgButter, b.x, b.y, b.w, b.h);
                    const bHB = { x: b.x + 22, y: b.y + 18, w: 16, h: 14 };

                    if (tHB.x < bHB.x + bHB.w && tHB.x + tHB.w > bHB.x && tHB.y < bHB.y + bHB.h && tHB.y + tHB.h > bHB.y) {
                        gameState = 'GAMEOVER';
                    }
                });

                ctx.save();
                ctx.translate(200, toastY + 25);
                ctx.rotate(rotation);
                ctx.drawImage(imgToast, -25, -25, 50, 50);
                ctx.restore();

                // --- CEILING & FLOOR BOUNDARIES ---
                if (toastY > TABLE_HEIGHT - 40 || toastY < -10) {
                    gameState = 'GAMEOVER';
                }

                ctx.fillStyle = "white";
                ctx.strokeStyle = "#4a3728";
                ctx.lineWidth = 4;
                ctx.font = "24px Arial Black";
                ctx.strokeText(`Score: ${Math.floor(score/10)}`, 20, 50);
                ctx.fillText(`Score: ${Math.floor(score/10)}`, 20, 50);
            } 
            
            else if (gameState === 'GAMEOVER') {
                if (Math.floor(score/10) > highScore) {
                    highScore = Math.floor(score/10);
                    localStorage.setItem('highScore', highScore);
                }

                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.fillRect(50, 180, 300, 260);
                ctx.fillStyle = "#4a3728";
                ctx.font = "28px Arial Black";
                ctx.fillText("BREAD DOWN!", 95, 235);
                ctx.font = "22px Arial Black";
                ctx.fillText(`SCORE: ${Math.floor(score/10)}`, 140, 290);
                ctx.fillText(`BEST: ${highScore}`, 145, 330);
                ctx.font = "14px Arial";
                ctx.fillText("Screenshot your score!", 120, 380);
                ctx.fillText("Tap to try again", 135, 410);
            }

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
