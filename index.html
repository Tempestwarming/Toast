<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Don't Drop the Dough</title>
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            /* CINEMATIC GREEN GRADIENT BACKGROUND */
            background: #000;
            background: radial-gradient(circle, #2e3b23 0%, #000000 80%);
            display: flex; justify-content: center; align-items: center; 
        }
        canvas { 
            background: #000; max-width: 100vw; max-height: 100vh; width: auto; height: auto; 
            aspect-ratio: 400 / 600; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 2px solid #4a3728; display: block; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Assets
        const imgToast = new Image(); imgToast.src = 'toast.png';
        const imgToaster = new Image(); imgToaster.src = 'toaster.png';
        const imgButter = new Image(); imgButter.src = 'butter.png';
        const imgBg = new Image(); imgBg.src = 'background.png';

        const bgMusic = new Audio('toastmusic.mp3');
        bgMusic.loop = true;
        let audioStarted = false;

        // Constants
        const TABLE_HEIGHT = 520; 
        // DEDICATED START & RESTART BUTTONS (Centered)
        const BTN = { x: 100, y: 380, w: 200, h: 50 }; 

        // Game State
        let gameState = 'START';
        let toastY = 460, velocity = 0, gravity = 0.25, rotation = 0;
        let score = 0, highScore = localStorage.getItem('highScore') || 0;
        let butters = [], crumbs = [], frameCount = 0;
        
        let initialGravity = 0.25;

        // --- HELPER: Mobile Coordinate Scaling ---
        function getCanvasMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        // --- THE "TOASTED" GRADIENT BUTTON DRAW FUNCTION ---
        // Draws a button that looks like a piece of toast
        function drawToastButton(text, x, y, w, h, alpha = 1) {
            ctx.save();
            ctx.translate(x, y);

            // 1. Shadow/Glow (pulses slightly)
            if (alpha === 1) { // Pulsing only on the start screen
                ctx.shadowColor = `rgba(210, 180, 140, ${0.4 + Math.sin(Date.now() * 0.005) * 0.1})`;
                ctx.shadowBlur = 15;
            }

            // 2. The CRUST Border (Sandy Brown to Darker Brown)
            ctx.strokeStyle = "#4a3728"; // Dark crust color
            ctx.lineWidth = 4;
            ctx.fillStyle = "#8b4513"; // Dark background fill
            // Rounded rectangle hack
            ctx.beginPath();
            ctx.roundRect(0, 0, w, h, 10);
            ctx.fill();
            ctx.stroke();

            // 3. The TOASTED FACE (Internal Gradient: Golden sandy brown to darker)
            let grd = ctx.createLinearGradient(0, 0, 0, h);
            grd.addColorStop(0, "#f5deb3"); // Wheat/Sandy light brown
            grd.addColorStop(0.5, "#d2b48c"); // Golden sandy brown
            grd.addColorStop(1, "#bc8f8f"); // Darker toasted brown
            
            ctx.shadowBlur = 0; // Turn shadow off for the internal face
            ctx.fillStyle = grd;
            ctx.beginPath();
            // Inset rounded rectangle
            ctx.roundRect(4, 4, w - 8, h - 8, 8);
            ctx.fill();

            // 4. The TEXT
            ctx.fillStyle = "#4a3728"; // Dark brown text
            ctx.font = "20px Arial Black";
            ctx.textAlign = "center";
            ctx.fillText(text, w / 2, h / 2 + 7); // Center text
            ctx.restore();
        }

        function handleInput(e) {
            if (e && e.cancelable) e.preventDefault(); 
            const pos = getCanvasMousePos(e);

            if (!audioStarted) { bgMusic.play().catch(e => {}); audioStarted = true; }

            if (gameState === 'START') {
                // START the game by clicking THE "START GAME" BUTTON ONLY
                if (pos.x >= BTN.x && pos.x <= BTN.x + BTN.w && pos.y >= BTN.y && pos.y <= BTN.y + BTN.h) {
                    gameState = 'PLAYING';
                    velocity = -11;
                }
            } 
            else if (gameState === 'PLAYING') {
                velocity = -5.5;
                for(let i=0; i<5; i++) {
                    crumbs.push({x: 200, y: toastY+25, vx: Math.random()*4-2, vy: Math.random()*2, life: 1});
                }
            } 
            else if (gameState === 'GAMEOVER') {
                // RESTART the game by clicking THE "PLAY AGAIN" BUTTON ONLY
                if (pos.x >= BTN.x && pos.x <= BTN.x + BTN.w && pos.y >= BTN.y && pos.y <= BTN.y + BTN.h) {
                    resetGame();
                }
            }
        }

        function resetGame() {
            toastY = 460; velocity = 0; score = 0; gravity = initialGravity;
            butters = []; crumbs = []; gameState = 'START'; frameCount = 0;
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space' && gameState === 'PLAYING') handleInput(e); });
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', handleInput, {passive: false});

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);

            // Crumbs
            crumbs.forEach((c, i) => {
                c.x += c.vx; c.y += c.vy; c.life -= 0.02;
                ctx.fillStyle = `rgba(139, 69, 19, ${c.life})`;
                ctx.fillRect(c.x, c.y, 4, 4);
                if(c.life <= 0) crumbs.splice(i, 1);
            });

            if (gameState === 'START') {
                ctx.drawImage(imgToaster, 130, 430, 140, 100);
                ctx.drawImage(imgToast, 175, 420, 50, 50);
                
                // --- THE GORGEOUS START CARD ---
                ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
                ctx.fillRect(40, 100, 320, 260); // Card Background
                ctx.strokeStyle = "#4a3728"; ctx.lineWidth = 6; ctx.strokeRect(40, 100, 320, 260);

                ctx.fillStyle = "#4a3728"; ctx.font = "22px Arial Black"; ctx.fillText("DON'T DROP THE DOUGH!", 55, 150);
                ctx.font = "16px Arial Black"; ctx.fillText("Avoid the butter & table!", 85, 200);
                ctx.fillText("Tap the button to eject", 100, 230);
                
                // Draw the Animated Toasted Start Button
                drawToastButton("START GAME", BTN.x, BTN.y, BTN.w, BTN.h, 1);
            } 
            
            else if (gameState === 'PLAYING') {
                frameCount++;
                let displayScore = Math.floor(score/10);
                
                // SMOOTH PROGRESSION LOGIC (Speed and gravity increase gently)
                let speedLevel = Math.floor(displayScore / 50);
                let currentSpeed = 2.0 + (speedLevel * 0.15);
                let currentSpawnRate = Math.max(50, 90 - (speedLevel * 5));
                gravity = initialGravity + (speedLevel * 0.005); // Gravity increases per level

                velocity += gravity;
                toastY += velocity;
                rotation += velocity * 0.1;
                score += (toastY > 450) ? 10 : 1;

                if (frameCount % Math.floor(currentSpawnRate) === 0) {
                    let y = 40 + Math.random() * 410;
                    butters.push({ x: canvas.width, y: y });
                }

                const tHB = { x: 175 + 15, y: toastY + 15, w: 20, h: 20 };

                butters.forEach((b, i) => {
                    b.x -= currentSpeed;
                    
                    // --- NO WAVY MOTION --- Butter now travels straight.
                    
                    ctx.drawImage(imgButter, b.x, b.y, 60, 50);
                    const bHB = { x: b.x + 22, y: b.y + 18, w: 16, h: 14 };

                    if (tHB.x < bHB.x + bHB.w && tHB.x + tHB.w > bHB.x && tHB.y < bHB.y + bHB.h && tHB.y + tHB.h > bHB.y) gameState = 'GAMEOVER';
                    if (b.x < -70) butters.splice(i, 1);
                });

                ctx.save();
                ctx.translate(200, toastY + 25);
                ctx.rotate(rotation);
                ctx.drawImage(imgToast, -25, -25, 50, 50);
                ctx.restore();

                if (toastY > TABLE_HEIGHT - 40 || toastY < -20) gameState = 'GAMEOVER';

                // HUD Score
                ctx.fillStyle = "white"; ctx.strokeStyle = "#4a3728"; ctx.lineWidth = 4; ctx.font = "24px Arial Black";
                ctx.strokeText(`Score: ${displayScore}`, 20, 50); ctx.fillText(`Score: ${displayScore}`, 20, 50);
            } 
            
            else if (gameState === 'GAMEOVER') {
                if (Math.floor(score/10) > highScore) {
                    highScore = Math.floor(score/10);
                    localStorage.setItem('highScore', highScore);
                }
                
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0, canvas.width, canvas.height);

                ctx.fillStyle = "white"; ctx.fillRect(50, 150, 300, 310);
                ctx.strokeStyle = "#4a3728"; ctx.lineWidth = 4; ctx.strokeRect(50, 150, 300, 310);

                ctx.fillStyle = "#4a3728"; ctx.font = "26px Arial Black"; ctx.fillText("BREAD DOWN!", 95, 210);
                ctx.font = "20px Arial Black"; ctx.fillText(`SCORE: ${Math.floor(score/10)}`, 140, 275);
                ctx.fillText(`BEST: ${highScore}`, 145, 315);

                // --- Draw the same "Toasted" Button for Play Again ---
                drawToastButton("PLAY AGAIN", BTN.x, BTN.y, BTN.w, BTN.h, 1);
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
