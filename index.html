<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Don't Drop the Dough</title>
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; 
            background: #000;
            background: radial-gradient(circle, #2e3b23 0%, #000000 80%);
            display: flex; justify-content: center; align-items: center; 
        }
        canvas { 
            background: #000; max-width: 100vw; max-height: 100vh; width: auto; height: auto; 
            aspect-ratio: 400 / 600; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 2px solid #4a3728; display: block; 
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Assets
        const imgToast = new Image(); imgToast.src = 'toast.png';
        const imgToaster = new Image(); imgToaster.src = 'toaster.png';
        const imgButter = new Image(); imgButter.src = 'butter.png';
        const imgBg = new Image(); imgBg.src = 'background.png';

        const bgMusic = new Audio('toastmusic.mp3');
        bgMusic.loop = true;
        let audioStarted = false;

        const TABLE_HEIGHT = 520; 
        const BTN = { x: 100, y: 330, w: 200, h: 55 }; // Adjusted Y position

        let gameState = 'START';
        let toastY = 460, velocity = 0, gravity = 0.25, rotation = 0;
        let score = 0, highScore = localStorage.getItem('highScore') || 0;
        let butters = [], crumbs = [], frameCount = 0;
        let initialGravity = 0.25;

        // Custom rounded rect for older browser compatibility
        function fillRoundedRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }

        function strokeRoundedRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.stroke();
        }

        function drawToastButton(text, x, y, w, h) {
            ctx.save();
            // 1. Crust/Border
            ctx.strokeStyle = "#4a3728";
            ctx.lineWidth = 5;
            ctx.fillStyle = "#8b4513";
            fillRoundedRect(x, y, w, h, 12);
            strokeRoundedRect(x, y, w, h, 12);

            // 2. Toasted Face Gradient
            let grd = ctx.createLinearGradient(x, y, x, y + h);
            grd.addColorStop(0, "#f5deb3");
            grd.addColorStop(0.5, "#d2b48c");
            grd.addColorStop(1, "#bc8f8f");
            
            ctx.fillStyle = grd;
            fillRoundedRect(x + 4, y + 4, w - 8, h - 8, 10);

            // 3. Text
            ctx.fillStyle = "#4a3728";
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "center";
            ctx.fillText(text, x + w/2, y + h/2 + 7);
            ctx.restore();
        }

        function getCanvasMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function handleInput(e) {
            if (e && e.cancelable) e.preventDefault(); 
            const pos = getCanvasMousePos(e);

            if (!audioStarted) { bgMusic.play().catch(e => {}); audioStarted = true; }

            if (gameState === 'START' || gameState === 'GAMEOVER') {
                if (pos.x >= BTN.x && pos.x <= BTN.x + BTN.w && pos.y >= BTN.y && pos.y <= BTN.y + BTN.h) {
                    resetGame();
                    gameState = 'PLAYING';
                    velocity = -11;
                }
            } 
            else if (gameState === 'PLAYING') {
                velocity = -5.5;
                for(let i=0; i<5; i++) {
                    crumbs.push({x: 200, y: toastY+25, vx: Math.random()*4-2, vy: Math.random()*2, life: 1});
                }
            }
        }

        function resetGame() {
            toastY = 460; velocity = 0; score = 0; gravity = initialGravity;
            butters = []; crumbs = []; frameCount = 0;
        }

        window.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', handleInput, {passive: false});

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);

            crumbs.forEach((c, i) => {
                c.x += c.vx; c.y += c.vy; c.life -= 0.02;
                ctx.fillStyle = `rgba(139, 69, 19, ${c.life})`;
                ctx.fillRect(c.x, c.y, 4, 4);
                if(c.life <= 0) crumbs.splice(i, 1);
            });

            if (gameState === 'START') {
                ctx.drawImage(imgToaster, 130, 430, 140, 100);
                ctx.drawImage(imgToast, 175, 420, 50, 50);
                
                ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
                fillRoundedRect(40, 120, 320, 300, 15);
                ctx.strokeStyle = "#4a3728"; ctx.lineWidth = 5;
                strokeRoundedRect(40, 120, 320, 300, 15);

                ctx.fillStyle = "#4a3728";
                ctx.font = "bold 22px Arial"; ctx.textAlign = "center";
                ctx.fillText("DON'T DROP THE DOUGH!", 200, 180);
                ctx.font = "16px Arial";
                ctx.fillText("Avoid the butter & table!", 200, 230);
                ctx.fillText("Tap the button to start", 200, 260);
                
                drawToastButton("START GAME", BTN.x, BTN.y, BTN.w, BTN.h);
            } 
            
            else if (gameState === 'PLAYING') {
                frameCount++;
                let displayScore = Math.floor(score/10);
                let speedLevel = Math.floor(displayScore / 50);
                let currentSpeed = 2.0 + (speedLevel * 0.15);
                let currentSpawnRate = Math.max(50, 90 - (speedLevel * 5));
                gravity = initialGravity + (speedLevel * 0.005);

                velocity += gravity;
                toastY += velocity;
                rotation += velocity * 0.1;
                score += (toastY > 450) ? 10 : 1;

                if (frameCount % Math.floor(currentSpawnRate) === 0) {
                    butters.push({ x: canvas.width, y: 40 + Math.random() * 410 });
                }

                butters.forEach((b, i) => {
                    b.x -= currentSpeed;
                    ctx.drawImage(imgButter, b.x, b.y, 60, 50);
                    const tHB = { x: 175 + 15, y: toastY + 15, w: 20, h: 20 };
                    const bHB = { x: b.x + 22, y: b.y + 18, w: 16, h: 14 };

                    if (tHB.x < bHB.x + bHB.w && tHB.x + tHB.w > bHB.x && tHB.y < bHB.y + bHB.h && tHB.y + tHB.h > bHB.y) gameState = 'GAMEOVER';
                    if (b.x < -70) butters.splice(i, 1);
                });

                ctx.save();
                ctx.translate(200, toastY + 25);
                ctx.rotate(rotation);
                ctx.drawImage(imgToast, -25, -25, 50, 50);
                ctx.restore();

                if (toastY > TABLE_HEIGHT - 40 || toastY < -20) gameState = 'GAMEOVER';

                ctx.fillStyle = "white"; ctx.strokeStyle = "#4a3728"; ctx.lineWidth = 4; ctx.font = "bold 24px Arial"; ctx.textAlign = "left";
                ctx.strokeText(`Score: ${displayScore}`, 20, 50); ctx.fillText(`Score: ${displayScore}`, 20, 50);
            } 
            
            else if (gameState === 'GAMEOVER') {
                if (Math.floor(score/10) > highScore) {
                    highScore = Math.floor(score/10);
                    localStorage.setItem('highScore', highScore);
                }
                ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "white"; fillRoundedRect(50, 150, 300, 300, 15);
                ctx.strokeStyle = "#4a3728"; ctx.lineWidth = 5; strokeRoundedRect(50, 150, 300, 300, 15);

                ctx.fillStyle = "#4a3728"; ctx.textAlign = "center";
                ctx.font = "bold 28px Arial"; ctx.fillText("BREAD DOWN!", 200, 210);
                ctx.font = "bold 20px Arial"; ctx.fillText(`SCORE: ${Math.floor(score/10)}`, 200, 270);
                ctx.fillText(`BEST: ${highScore}`, 200, 310);

                drawToastButton("PLAY AGAIN", BTN.x, BTN.y, BTN.w, BTN.h);
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
