<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Don't Drop the Dough</title>
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle, #2e3b23 0%, #000000 80%); display: flex; justify-content: center; align-items: center; }
        canvas { background: #000; max-width: 100vw; max-height: 100vh; width: auto; height: auto; aspect-ratio: 400 / 600; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 2px solid #4a3728; display: block; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Assets
        const imgToast = new Image(); imgToast.src = 'toast.png';
        const imgToaster = new Image(); imgToaster.src = 'toaster.png';
        const imgButter = new Image(); imgButter.src = 'butter.png';
        const imgBg = new Image(); imgBg.src = 'background.png';

        const bgMusic = new Audio('toastmusic.mp3');
        bgMusic.loop = true;
        let audioStarted = false;

        // Game State
        const TABLE_HEIGHT = 520; 
        let gameState = 'START';
        let toastY = 460, velocity = 0, gravity = 0.25, rotation = 0;
        let score = 0, highScore = localStorage.getItem('highScore') || 0;
        let butters = [], crumbs = [], frameCount = 0;
        
        let baseButterSpeed = 2.5; 
        let spawnRate = 90;

        // Button Coordinates (Centered on Screen)
        const btn = { x: 100, y: 380, w: 200, h: 50 };

        function handleInput(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            // Get click coordinates relative to the 400x600 canvas
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let mouseX = (clientX - rect.left) * scaleX;
            let mouseY = (clientY - rect.top) * scaleY;

            if (e && e.cancelable) e.preventDefault(); 

            // Audio Unlock
            if (!audioStarted) { bgMusic.play().catch(e => {}); audioStarted = true; }

            if (gameState === 'START') {
                gameState = 'PLAYING';
                velocity = -11;
            } 
            else if (gameState === 'PLAYING') {
                velocity = -5.5;
                for(let i=0; i<5; i++) {
                    crumbs.push({x: 200, y: toastY+25, vx: Math.random()*4-2, vy: Math.random()*2, life: 1});
                }
            } 
            else if (gameState === 'GAMEOVER') {
                // Check if the click was inside the "Play Again" button
                if (mouseX >= btn.x && mouseX <= btn.x + btn.w && mouseY >= btn.y && mouseY <= btn.y + btn.h) {
                    resetGame();
                }
            }
        }

        function resetGame() {
            toastY = 460; velocity = 0; gravity = 0.25; rotation = 0;
            score = 0; butters = []; crumbs = []; gameState = 'START'; frameCount = 0;
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(e); });
        canvas.addEventListener('mousedown', (e) => handleInput(e));
        canvas.addEventListener('touchstart', (e) => handleInput(e), {passive: false});

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);

            // Crumbs
            crumbs.forEach((c, i) => {
                c.x += c.vx; c.y += c.vy; c.life -= 0.02;
                ctx.fillStyle = `rgba(139, 69, 19, ${c.life})`;
                ctx.fillRect(c.x, c.y, 4, 4);
                if(c.life <= 0) crumbs.splice(i, 1);
            });

            if (gameState === 'START') {
                ctx.drawImage(imgToaster, 130, 430, 140, 100);
                ctx.drawImage(imgToast, 175, 420, 50, 50);
                ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                ctx.fillRect(40, 100, 320, 220);
                ctx.fillStyle = "#4a3728";
                ctx.font = "22px Arial Black";
                ctx.fillText("DON'T DROP THE DOUGH!", 50, 150);
                ctx.font = "16px Arial Black";
                ctx.fillText("Tap anywhere to start", 105, 200);
                ctx.fillText("Avoid the butter!", 130, 230);
            } 
            
            else if (gameState === 'PLAYING') {
                frameCount++;
                let displayScore = Math.floor(score/10);
                let level = Math.floor(displayScore / 50);
                let currentSpeed = baseButterSpeed + (level * 0.75);
                let currentSpawnRate = Math.max(40, spawnRate - (level * 10));

                velocity += gravity;
                toastY += velocity;
                rotation += velocity * 0.1;
                score += (toastY > 450) ? 10 : 1;

                if (frameCount % Math.floor(currentSpawnRate) === 0) {
                    let sniperChance = Math.min(0.45, 0.15 + (level * 0.05));
                    let y = (Math.random() < sniperChance) ? toastY - 10 : 30 + Math.random() * 420;
                    butters.push({ x: canvas.width, y: y, seed: Math.random() * 10 });
                }

                const tHB = { x: 175 + 15, y: toastY + 15, w: 20, h: 20 };

                butters.forEach((b, i) => {
                    b.x -= currentSpeed;
                    let wave = (level >= 2) ? Math.sin(b.x * 0.05 + b.seed) * Math.min(30, (level - 1) * 10) : 0;
                    ctx.drawImage(imgButter, b.x, b.y + wave, 60, 50);
                    const bHB = { x: b.x + 22, y: b.y + 18 + wave, w: 16, h: 14 };
                    if (tHB.x < bHB.x + bHB.w && tHB.x + tHB.w > bHB.x && tHB.y < bHB.y + bHB.h && tHB.y + tHB.h > bHB.y) gameState = 'GAMEOVER';
                    if (b.x < -60) butters.splice(i, 1);
                });

                ctx.save();
                ctx.translate(200, toastY + 25);
                ctx.rotate(rotation);
                ctx.drawImage(imgToast, -25, -25, 50, 50);
                ctx.restore();

                if (toastY > TABLE_HEIGHT - 40 || toastY < -15) gameState = 'GAMEOVER';

                ctx.fillStyle = "white"; ctx.strokeStyle = "#4a3728"; ctx.lineWidth = 4; ctx.font = "24px Arial Black";
                ctx.strokeText(`Score: ${displayScore}`, 20, 50);
                ctx.fillText(`Score: ${displayScore}`, 20, 50);
            } 
            
            else if (gameState === 'GAMEOVER') {
                if (Math.floor(score/10) > highScore) {
                    highScore = Math.floor(score/10);
                    localStorage.setItem('highScore', highScore);
                }
                
                // Dark Background Overlay
                ctx.fillStyle = "rgba(0,0,0,0.75)";
                ctx.fillRect(0,0, canvas.width, canvas.height);

                // Score Card
                ctx.fillStyle = "white";
                ctx.fillRect(50, 150, 300, 300);
                ctx.strokeStyle = "#4a3728";
                ctx.lineWidth = 5;
                ctx.strokeRect(50, 150, 300, 300);

                ctx.fillStyle = "#4a3728";
                ctx.font = "28px Arial Black";
                ctx.fillText("BREAD DOWN!", 95, 210);
                
                ctx.font = "20px Arial Black";
                ctx.fillText(`SCORE: ${Math.floor(score/10)}`, 140, 270);
                ctx.fillText(`BEST: ${highScore}`, 145, 310);

                // --- THE RESTART BUTTON ---
                ctx.fillStyle = "#4a3728";
                ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
                ctx.fillStyle = "white";
                ctx.font = "18px Arial Black";
                ctx.fillText("PLAY AGAIN", 140, 412);
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
