<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Don't Drop the Dough</title>
    <style>
        /* 2. RESPONSIVE CSS: Makes the canvas fill the screen width */
        body { 
            text-align: center; 
            background: #2e3b23; 
            font-family: 'Arial Black', sans-serif; 
            overflow: hidden; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Centers the game vertically on mobile */
        }
        canvas { 
            background: #000; 
            border: 4px solid #4a3728; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            /* This is the magic for mobile sizing */
            max-width: 95vw; 
            max-height: 90vh;
            width: auto;
            height: auto;
            touch-action: none; /* Prevents the phone from scrolling while you play */
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- ASSETS ---
        const imgToast = new Image(); imgToast.src = 'toast.png';
        const imgToaster = new Image(); imgToaster.src = 'toaster.png';
        const imgButter = new Image(); imgButter.src = 'butter.png';
        const imgBg = new Image(); imgBg.src = 'background.png';

        // --- AUDIO ---
        const bgMusic = new Audio('toastmusic.mp3');
        bgMusic.loop = true;
        let audioStarted = false;

        const TABLE_HEIGHT = 520; 
        let gameState = 'START';
        let toastY = 460;
        let velocity = 0;
        let gravity = 0.25; 
        let rotation = 0;
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let butters = [];
        let butterSpeed = 4;
        let frameCount = 0;

        function handleInput(e) {
            if(e) e.preventDefault(); // Stop mobile "zoom" on double tap

            if (!audioStarted) {
                bgMusic.play().catch(e => console.log("Audio waiting..."));
                audioStarted = true;
            }

            if (gameState === 'START') {
                gameState = 'PLAYING';
                velocity = -12;
            } else if (gameState === 'PLAYING') {
                velocity = -6;
            } else if (gameState === 'GAMEOVER') {
                resetGame();
            }
        }

        function resetGame() {
            toastY = 460; velocity = 0; score = 0; butterSpeed = 4;
            butters = []; gameState = 'START'; frameCount = 0;
        }

        // Support for Spacebar, Mouse Click, and Touch Taps
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(); });
        canvas.addEventListener('mousedown', (e) => handleInput(e));
        canvas.addEventListener('touchstart', (e) => handleInput(e), {passive: false});

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);

            if (gameState === 'START') {
                ctx.drawImage(imgToaster, 130, 430, 140, 100);
                ctx.drawImage(imgToast, 175, 420, 50, 50);
                
                ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
                ctx.fillRect(40, 100, 320, 200);
                ctx.fillStyle = "#4a3728";
                ctx.font = "20px Arial Black";
                ctx.fillText("DON'T DROP THE DOUGH!", 55, 150);
                ctx.font = "16px Arial Black";
                ctx.fillText("Tap to eject!", 135, 190);
                ctx.fillText("Avoid the butter & table!", 85, 220);
                ctx.font = "20px Arial Black";
                ctx.fillText("TAP TO START", 115, 270);
            } 
            
            else if (gameState === 'PLAYING') {
                frameCount++;
                if (frameCount % 400 === 0) butterSpeed += 0.5;

                velocity += gravity;
                toastY += velocity;
                rotation += velocity * 0.1;

                let multiplier = (toastY > 450) ? 10 : 1;
                score += (1 * multiplier);

                if (frameCount % 75 === 0) {
                    butters.push({ x: canvas.width, y: 50 + Math.random() * 350, w: 60, h: 50 });
                }

                // PRECISION HITBOXES
                const tHB = { x: 175 + 15, y: toastY + 15, w: 20, h: 20 };

                butters.forEach((b, i) => {
                    b.x -= butterSpeed;
                    ctx.drawImage(imgButter, b.x, b.y, b.w, b.h);
                    const bHB = { x: b.x + 20, y: b.y + 15, w: 20, h: 20 };

                    if (tHB.x < bHB.x + bHB.w && tHB.x + tHB.w > bHB.x && tHB.y < bHB.y + bHB.h && tHB.y + tHB.h > bHB.y) {
                        gameState = 'GAMEOVER';
                    }
                });

                ctx.save();
                ctx.translate(200, toastY + 25);
                ctx.rotate(rotation);
                ctx.drawImage(imgToast, -25, -25, 50, 50);
                ctx.restore();

                if (toastY > TABLE_HEIGHT - 40 || toastY < -100) gameState = 'GAMEOVER';

                ctx.fillStyle = "white";
                ctx.strokeStyle = "#4a3728";
                ctx.lineWidth = 4;
                ctx.font = "24px Arial Black";
                ctx.strokeText(`Score: ${Math.floor(score/10)}`, 20, 50);
                ctx.fillText(`Score: ${Math.floor(score/10)}`, 20, 50);
            } 
            
            else if (gameState === 'GAMEOVER') {
                if (Math.floor(score/10) > highScore) {
                    highScore = Math.floor(score/10);
                    localStorage.setItem('highScore', highScore);
                }

                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.fillRect(50, 180, 300, 260);
                ctx.fillStyle = "#4a3728";
                ctx.font = "28px Arial Black";
                ctx.fillText("BREAD DOWN!", 95, 235);
                ctx.font = "22px Arial Black";
                ctx.fillText(`SCORE: ${Math.floor(score/10)}`, 140, 290);
                ctx.fillText(`BEST: ${highScore}`, 145, 330);
                ctx.font = "14px Arial";
                ctx.fillText("Screenshot your score!", 120, 380);
                ctx.fillText("Tap to try again", 135, 410);
            }

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
