<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Don't Drop the Dough</title>
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle, #2e3b23 0%, #000000 80%); display: flex; justify-content: center; align-items: center; }
        canvas { background: #000; max-width: 100vw; max-height: 100vh; width: auto; height: auto; aspect-ratio: 400 / 600; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 2px solid #4a3728; display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Assets
        const imgToast = new Image(); imgToast.src = 'toast.png';
        const imgToaster = new Image(); imgToaster.src = 'toaster.png';
        const imgButter = new Image(); imgButter.src = 'butter.png';
        const imgBg = new Image(); imgBg.src = 'background.png';

        const bgMusic = new Audio('toastmusic.mp3');
        bgMusic.loop = true;
        let audioStarted = false;

        // Constants
        const TABLE_HEIGHT = 520; 
        const BUTTER_WAVE_INTENSITY = 12; // Constant subtle wave
        const RESTART_BTN = { x: 100, y: 380, w: 200, h: 50 };

        // Game State
        let gameState = 'START';
        let toastY = 460, velocity = 0, gravity = 0.25, rotation = 0;
        let score = 0, highScore = localStorage.getItem('highScore') || 0;
        let butters = [], crumbs = [], frameCount = 0;

        // --- HELPER: Fixes the "Button Not Working" on Mobile ---
        function getCanvasMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function handleInput(e) {
            if (e && e.cancelable) e.preventDefault(); 
            const pos = getCanvasMousePos(e);

            if (!audioStarted) { bgMusic.play().catch(e => {}); audioStarted = true; }

            if (gameState === 'START') {
                gameState = 'PLAYING';
                velocity = -11;
            } 
            else if (gameState === 'PLAYING') {
                velocity = -5.5;
                for(let i=0; i<5; i++) {
                    crumbs.push({x: 200, y: toastY+25, vx: Math.random()*4-2, vy: Math.random()*2, life: 1});
                }
            } 
            else if (gameState === 'GAMEOVER') {
                // Check Button Collision exactly
                if (pos.x >= RESTART_BTN.x && pos.x <= RESTART_BTN.x + RESTART_BTN.w &&
                    pos.y >= RESTART_BTN.y && pos.y <= RESTART_BTN.y + RESTART_BTN.h) {
                    resetGame();
                }
            }
        }

        function resetGame() {
            toastY = 460; velocity = 0; score = 0;
            butters = []; crumbs = []; gameState = 'START'; frameCount = 0;
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(e); });
        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', handleInput, {passive: false});

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);

            // Crumbs
            crumbs.forEach((c, i) => {
                c.x += c.vx; c.y += c.vy; c.life -= 0.02;
                ctx.fillStyle = `rgba(139, 69, 19, ${c.life})`;
                ctx.fillRect(c.x, c.y, 4, 4);
                if(c.life <= 0) crumbs.splice(i, 1);
            });

            if (gameState === 'START') {
                ctx.drawImage(imgToaster, 130, 430, 140, 100);
                ctx.drawImage(imgToast, 175, 420, 50, 50);
                ctx.fillStyle = "rgba(255, 255, 255, 0.9)";
                ctx.fillRect(40, 100, 320, 220);
                ctx.fillStyle = "#4a3728";
                ctx.font = "20px Arial Black";
                ctx.fillText("DON'T DROP THE DOUGH!", 55, 150);
                ctx.font = "14px Arial Black";
                ctx.fillText("Avoid the butter & boundaries", 75, 200);
                ctx.font = "18px Arial Black";
                ctx.fillText("TAP TO START", 125, 270);
            } 
            
            else if (gameState === 'PLAYING') {
                frameCount++;
                let displayScore = Math.floor(score/10);
                
                // --- SLOW PROGRESSION LOGIC ---
                // Starts very slow (2.0), adds 0.1 speed every 50 display points
                let currentSpeed = 2.0 + (Math.floor(displayScore / 50) * 0.15);
                let currentSpawnRate = Math.max(50, 90 - (Math.floor(displayScore / 50) * 5));

                velocity += gravity;
                toastY += velocity;
                rotation += velocity * 0.1;
                score += (toastY > 450) ? 10 : 1;

                if (frameCount % Math.floor(currentSpawnRate) === 0) {
                    let y = 40 + Math.random() * 410;
                    butters.push({ x: canvas.width, y: y, seed
