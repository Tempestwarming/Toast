<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Don't Drop the Dough</title>
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; user-select: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle, #2e3b23 0%, #000000 80%); display: flex; justify-content: center; align-items: center; }
        canvas { background: #000; max-width: 100vw; max-height: 100vh; width: auto; height: auto; aspect-ratio: 400 / 600; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 2px solid #4a3728; display: block; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Assets
        const imgToast = new Image(); imgToast.src = 'toast.png';
        const imgToaster = new Image(); imgToaster.src = 'toaster.png';
        const imgButter = new Image(); imgButter.src = 'butter.png';
        const imgBg = new Image(); imgBg.src = 'background.png';

        const bgMusic = new Audio('toastmusic.mp3');
        bgMusic.loop = true;
        let audioStarted = false;

        // Game State
        const TABLE_HEIGHT = 520; 
        let gameState = 'START';
        let toastY = 460, velocity = 0, gravity = 0.25, rotation = 0;
        let score = 0, highScore = localStorage.getItem('highScore') || 0;
        let butters = [], crumbs = [], frameCount = 0;
        
        // Difficulty Variables
        let currentButterSpeed = 4;
        let spawnRate = 70; 

        function handleInput(e) {
            if (e && e.cancelable) e.preventDefault(); 
            if (!audioStarted) { bgMusic.play().catch(e => {}); audioStarted = true; }

            if (gameState === 'START') {
                gameState = 'PLAYING';
                velocity = -11;
            } else if (gameState === 'PLAYING') {
                velocity = -5.5;
                // Juice: Particle crumbs on jump
                for(let i=0; i<5; i++) {
                    crumbs.push({x: 200, y: toastY+25, vx: Math.random()*4-2, vy: Math.random()*2, life: 1});
                }
            } else if (gameState === 'GAMEOVER') {
                resetGame();
            }
        }

        function resetGame() {
            toastY = 460; velocity = 0; gravity = 0.25; rotation = 0;
            score = 0; currentButterSpeed = 4; spawnRate = 70;
            butters = []; crumbs = []; gameState = 'START'; frameCount = 0;
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(e); });
        canvas.addEventListener('mousedown', (e) => handleInput(e));
        canvas.addEventListener('touchstart', (e) => handleInput(e), {passive: false});

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);

            // Crumbs Logic
            crumbs.forEach((c, i) => {
                c.x += c.vx; c.y += c.vy; c.life -= 0.02;
                ctx.fillStyle = `rgba(139, 69, 19, ${c.life})`;
                ctx.fillRect(c.x, c.y, 4, 4);
                if(c.life <= 0) crumbs.splice(i, 1);
            });

            if (gameState === 'START') {
                ctx.drawImage(imgToaster, 130, 430, 140, 100);
                ctx.drawImage(imgToast, 175, 420, 50, 50);
                ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
                ctx.fillRect(40, 100, 320, 220);
                ctx.fillStyle = "#4a3728";
                ctx.font = "22px Arial Black";
                ctx.fillText("DON'T DROP THE DOUGH!", 50, 150);
                ctx.font = "14px Arial Black";
                ctx.fillText("Difficulty increases as you score!", 70, 190);
                ctx.fillText("Watch out for Wavy Butter!", 95, 215);
                ctx.font = "20px Arial Black";
                ctx.fillText("TAP TO EJECT", 125, 275);
            } 
            
            else if (gameState === 'PLAYING') {
                frameCount++;
                let displayScore = Math.floor(score/10);

                // --- PROGRESSIVE DIFFICULTY ENGINE ---
                // 1. Increase speed over time
                currentButterSpeed = 4 + (displayScore * 0.05);
                // 2. Increase gravity (makes toast "heavier")
                gravity = 0.25 + (displayScore * 0.001);
                // 3. Spawns get closer together
                spawnRate = Math.max(35, 70 - (displayScore * 0.5));

                velocity += gravity;
                toastY += velocity;
                rotation += velocity * 0.1;
                score += (toastY > 450) ? 10 : 1;

                // Butter Spawning
                if (frameCount % Math.floor(spawnRate) === 0) {
                    // Higher scores increase chance of "Sniper Butter"
                    let sniperChance = 0.2 + (displayScore * 0.01);
                    let y = (Math.random() < sniperChance) ? toastY - 10 : 30 + Math.random() * 420;
                    butters.push({ x: canvas.width, y: y, seed: Math.random() * 10, startY: y });
                }

                const tHB = { x: 175 + 15, y: toastY + 15, w: 20, h: 20 };

                butters.forEach((b, i) => {
                    b.x -= currentButterSpeed;
                    
                    // 4. Wavy Butter Pattern (Starts appearing at score 30)
                    let wave = 0;
                    if (displayScore > 30) {
                        let intensity = Math.min(40, (displayScore - 30) * 1.5);
                        wave = Math.sin(b.x * 0.05 + b.seed) * intensity;
                    }
                    
                    ctx.drawImage(imgButter, b.x, b.y + wave, 60, 50);
                    
                    const bHB = { x: b.x + 22, y: b.y + 18 + wave, w: 16, h: 14 };
                    if (tHB.x < bHB.x + bHB.w && tHB.x + tHB.w > bHB.x && tHB.y < bHB.y + bHB.h && tHB.y + tHB.h > bHB.y) gameState = 'GAMEOVER';
                    if (b.x < -60) butters.splice(i, 1);
                });

                // Draw Toast
                ctx.save();
                ctx.translate(200, toastY + 25);
                ctx.rotate(rotation);
                ctx.drawImage(imgToast, -25, -25, 50, 50);
                ctx.restore();

                // Boundaries
                if (toastY > TABLE_HEIGHT - 40 || toastY < -15) gameState = 'GAMEOVER';

                // HUD
                ctx.fillStyle = "white"; ctx.strokeStyle = "#4a3728"; ctx.lineWidth = 4; ctx.font = "24px Arial Black";
                ctx.strokeText(`Score: ${displayScore}`, 20, 50);
                ctx.fillText(`Score: ${displayScore}`, 20, 50);
            } 
            
            else if (gameState === 'GAMEOVER') {
                if (Math.floor(score/10) > highScore) {
                    highScore = Math.floor(score/10);
                    localStorage.setItem('highScore', highScore);
                }
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "white"; ctx.fillRect(50, 180, 300, 260);
                ctx.fillStyle = "#4a3728"; ctx.font = "28px Arial Black";
                ctx.fillText("BREAD DOWN!", 95, 235);
                ctx.font = "22px Arial Black";
                ctx.fillText(`SCORE: ${Math.floor(score/10)}`, 140, 290);
                ctx.fillText(`BEST: ${highScore}`, 145, 330);
                ctx.font = "14px Arial"; ctx.fillText("Tap to Restart", 145, 410);
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
