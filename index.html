<!DOCTYPE html>
<html>
<head>
    <title>Don't Drop the Dough</title>
    <style>
        body { text-align: center; background: #2e3b23; font-family: 'Arial Black', sans-serif; overflow: hidden; margin: 0; }
        canvas { background: #000; border: 5px solid #4a3728; margin-top: 10px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Asset Loading
        const imgToast = new Image(); imgToast.src = 'toast.png';
        const imgToaster = new Image(); imgToaster.src = 'toaster.png';
        const imgButter = new Image(); imgButter.src = 'butter.png';
        const imgBg = new Image(); imgBg.src = 'background.png';

        // Game Constants
        const TABLE_HEIGHT = 520; // Matches the wooden table in your image

        let gameState = 'START';
        let toastY = 460;
        let velocity = 0;
        let gravity = 0.25; 
        let rotation = 0;
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let butters = [];
        let butterSpeed = 4;
        let frameCount = 0;

        function handleInput() {
            if (gameState === 'START') {
                gameState = 'PLAYING';
                velocity = -12; // Eject!
            } else if (gameState === 'PLAYING') {
                velocity = -6; // Normal jump
            } else if (gameState === 'GAMEOVER') {
                resetGame();
            }
        }

        function resetGame() {
            toastY = 460; velocity = 0; score = 0; butterSpeed = 4;
            butters = []; gameState = 'START'; frameCount = 0;
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') handleInput(); });
        canvas.addEventListener('mousedown', handleInput);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Draw Background
            ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);

            if (gameState === 'START') {
                // Toaster sits on the table
                ctx.drawImage(imgToaster, 130, 430, 140, 100);
                // Toast peeks out of toaster
                ctx.drawImage(imgToast, 175, 420, 50, 50);
                
                ctx.fillStyle = "rgba(255, 255, 255, 0.85)";
                ctx.fillRect(40, 100, 320, 200);
                ctx.fillStyle = "#4a3728";
                ctx.font = "22px Arial Black";
                ctx.fillText("DON'T DROP THE DOUGH!", 55, 150);
                ctx.font = "16px Arial Black";
                ctx.fillText("Click to eject from the toaster!", 65, 190);
                ctx.fillText("Keep it off the wooden table!", 75, 220);
                ctx.font = "20px Arial Black";
                ctx.fillText("TAP TO START", 125, 270);
            } 
            
            else if (gameState === 'PLAYING') {
                frameCount++;
                if (frameCount % 400 === 0) butterSpeed += 0.5;

                velocity += gravity;
                toastY += velocity;
                rotation += velocity * 0.1;

                // Score Logic
                let multiplier = (toastY > 450) ? 10 : 1;
                score += (1 * multiplier);

                // Butter Obstacles
                if (frameCount % 75 === 0) {
                    butters.push({ x: canvas.width, y: 50 + Math.random() * 350, w: 60, h: 50 });
                }

                butters.forEach((b, i) => {
                    b.x -= butterSpeed;
                    ctx.drawImage(imgButter, b.x, b.y, b.w, b.h);
                    
                    // Collision (Toast is at center X: 175, Width: 50)
                    if (175 < b.x + b.w && 175 + 50 > b.x && toastY < b.y + b.h && toastY + 50 > b.y) {
                        gameState = 'GAMEOVER';
                    }
                });

                // Draw Spinning Toast
                ctx.save();
                ctx.translate(200, toastY + 25);
                ctx.rotate(rotation);
                ctx.drawImage(imgToast, -25, -25, 50, 50);
                ctx.restore();

                // Check Floor/Ceiling (TABLE_HEIGHT)
                if (toastY > TABLE_HEIGHT - 40 || toastY < -100) gameState = 'GAMEOVER';

                // UI
                ctx.fillStyle = "white";
                ctx.strokeStyle = "#4a3728";
                ctx.lineWidth = 4;
                ctx.font = "26px Arial Black";
                ctx.strokeText(`Score: ${Math.floor(score/10)}`, 20, 50);
                ctx.fillText(`Score: ${Math.floor(score/10)}`, 20, 50);
                if(multiplier > 1) {
                    ctx.fillStyle = "#ffcc00";
                    ctx.fillText("BONUS! 🔥", 20, 90);
                }
            } 
            
            else if (gameState === 'GAMEOVER') {
                if (Math.floor(score/10) > highScore) {
                    highScore = Math.floor(score/10);
                    localStorage.setItem('highScore', highScore);
                }

                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.fillRect(50, 180, 300, 260);
                ctx.fillStyle = "#4a3728";
                ctx.font = "28px Arial Black";
                ctx.fillText("BREAD DOWN!", 95, 235);
                ctx.font = "22px Arial Black";
                ctx.fillText(`SCORE: ${Math.floor(score/10)}`, 140, 290);
                ctx.fillText(`BEST: ${highScore}`, 145, 330);
                ctx.font = "14px Arial";
                ctx.fillText("Screenshot your high score!", 115, 380);
                ctx.fillText("Click to try again", 140, 410);
            }

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
