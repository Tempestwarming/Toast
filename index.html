<!DOCTYPE html>
<html>
<head>
    <title>Soggy Toast Escape</title>
    <style>
        body { text-align: center; background: #f0e68c; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { background: #fff; border: 5px solid #634721; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🍞 SOGGY TOAST ESCAPE 🍞</h1>
    <p>Dodge the flying butter! Tap to Jump.</p>
    <canvas id="gameCanvas" width="400" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let toastY = 300;
        let velocity = 0;
        let gravity = 0.4;
        let lift = -8;
        let score = 0;
        let isGameOver = false;

        // --- NEW: Butter Obstacles ---
        let butters = []; 
        let frameCount = 0;

        function spawnButter() {
            // Random height for the butter obstacle
            let randomY = Math.random() * (canvas.height - 100);
            butters.push({ x: canvas.width, y: randomY, width: 50, height: 30 });
        }

        function jump() {
            if (isGameOver) resetGame();
            else velocity = lift;
        }

        function resetGame() {
            toastY = 300;
            velocity = 0;
            score = 0;
            butters = [];
            frameCount = 0;
            isGameOver = false;
            draw();
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });
        canvas.addEventListener('mousedown', jump);

        function draw() {
            if (isGameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            frameCount++;

            // Physics
            velocity += gravity;
            toastY += velocity;

            // --- NEW: Handle Butter Logic ---
            if (frameCount % 100 === 0) spawnButter(); // Spawn butter every 100 frames

            for (let i = butters.length - 1; i >= 0; i--) {
                butters[i].x -= 3; // Move butter to the left

                // Draw Butter
                ctx.fillStyle = "#FFD700"; // Butter Yellow
                ctx.fillRect(butters[i].x, butters[i].y, butters[i].width, butters[i].height);

                // --- NEW: Collision Detection ---
                // If toast overlaps with butter box
                if (180 < butters[i].x + butters[i].width &&
                    180 + 40 > butters[i].x &&
                    toastY < butters[i].y + butters[i].height &&
                    toastY + 40 > butters[i].y) {
                    endGame();
                }

                // Remove butter if it goes off screen to save memory
                if (butters[i].x < -50) butters.splice(i, 1);
            }

            // Draw Water & Toast
            ctx.fillStyle = "#00bfff";
            ctx.fillRect(0, 550, canvas.width, 50);
            ctx.fillStyle = "#d2b48c";
            ctx.fillRect(180, toastY, 40, 40);

            if (toastY > 510 || toastY < 0) endGame();

            score++;
            ctx.fillStyle = "black";
            ctx.font = "20px Arial";
            ctx.fillText(`Score: ${Math.floor(score/10)}`, 10, 30);

            requestAnimationFrame(draw);
        }

        function endGame() {
            isGameOver = true;
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            ctx.fillText("BUTTERED! Game Over.", 90, 300);
            ctx.fillText("Click to try again", 120, 340);
        }

        draw();
    </script>
</body>
</html>
